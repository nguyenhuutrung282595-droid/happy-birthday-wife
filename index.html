.card{position:relative;z-index:3;width:min(92vw,430px);max-height:92svh;overflow:auto;text-align:center;padding:22px 18px 18px;border:1px solid rgba(255,255,255,.18);border-radius:26px;background:rgba(10,5,8,.55);backdrop-filter:blur(12px);box-shadow:0 20px 70px rgba(0,0,0,.55)}
.cover{width:100%;aspect-ratio:1/1.12;object-fit:cover;border-radius:22px;border:1px solid rgba(255,255,255,.2);box-shadow:0 12px 40px rgba(255,30,90,.25)}
.baby{width:128px;height:128px;object-fit:cover;border-radius:50%;border:3px solid #ffd5df;margin:-58px auto 8px;display:block;box-shadow:0 10px 35px rgba(255,255,255,.18)}
h1{font-size:28px;line-height:1.15;margin:10px 0 8px;background:linear-gradient(90deg,#fff,#ffd1dc,#fff);-webkit-background-clip:text;color:transparent}
.sub{color:#ffd1dc;font-size:15px;margin-bottom:12px}
#text{min-height:210px;text-align:left;line-height:1.65;font-size:17px;white-space:pre-line;padding:14px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}
.btn{margin-top:13px;border:0;border-radius:999px;padding:13px 18px;font-weight:700;color:#49101d;background:linear-gradient(90deg,#fff,#ffd1dc,#ff9db7);box-shadow:0 10px 30px rgba(255,89,130,.3)}
.small{font-size:12px;color:#e7b7c2;margin-top:10px}
.heart,.petal{position:fixed;z-index:2;top:-30px;pointer-events:none;animation:fall linear forwards}
.heart{color:#ff5f8b;text-shadow:0 0 12px #ff5f8b}.petal{color:#ffc3d3;opacity:.85}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:.08}}
.spark{position:fixed;width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff;z-index:4;animation:spark .85s ease-out forwards}
@keyframes spark{to{transform:translate(var(--x),var(--y));opacity:0}}
.open{position:absolute;z-index:10;inset:0;display:flex;align-items:center;justify-content:center;background:#000;transition:.8s}
.open.hide{opacity:0;pointer-events:none}.openbox{text-align:center;padding:24px}.count{font-size:64px;font-weight:900;color:#ffb8c8;text-shadow:0 0 25px #ff2f6d}.note{font-size:18px;color:#fff;margin-top:8px}
</style>

<h1>Chúc mừng sinh nhật vợ yêu ❤️</h1>
<div class="sub">Một món quà nhỏ từ anh và bé Khải Minh</div>
<div id="text"></div>
<button class="btn" onclick="fireworks()">Bắn pháo hoa 🎆</button>
<div class="small">Anh yêu em rất nhiều ❤️</div>
</main>
</div>
<audio id="music" loop><source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-piano-110375.mp3" type="audio/mpeg"></audio>
<script>
const message = `Vợ yêu của anh,

Chúc em sinh nhật thật vui vẻ, luôn xinh đẹp, mạnh khỏe và hạnh phúc.

Cảm ơn em đã đến bên anh, cùng anh xây dựng gia đình nhỏ của mình.

Cảm ơn em đã mang đến cho anh món quà quý giá nhất: bé Khải Minh 👶💙

Anh không hứa sẽ hoàn hảo, nhưng anh hứa sẽ luôn cố gắng yêu thương, che chở và đồng hành cùng mẹ con em.

Tuổi mới, chúc vợ yêu của anh luôn bình an, luôn cười thật nhiều và luôn được yêu thương.

Anh yêu em rất nhiều! ❤️`;
let started=false;
function start(){if(started)return;started=true;document.getElementById('music').play().catch(()=>{});let n=3,c=document.getElementById('count');const t=setInterval(()=>{n--;c.textContent=n>0?n:'❤️';if(n<0){clearInterval(t);document.getElementById('open').classList.add('hide');type();fireworks();}},650);}
function type(){let i=0,el=document.getElementById('text');const timer=setInterval(()=>{el.textContent=message.slice(0,i++);if(i>message.length){clearInterval(timer);fireworks();}},38);}
function makeHeart(){const e=document.createElement('div');e.className=Math.random()>.45?'heart':'petal';e.textContent=e.className==='heart'?'❤️':'🌹';e.style.left=Math.random()*100+'vw';e.style.fontSize=(14+Math.random()*22)+'px';e.style.animationDuration=(4+Math.random()*5)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),9000);}
setInterval(makeHeart,420);
function fireworks(){for(let b=0;b<4;b++){const cx=innerWidth*(.2+Math.random()*.6),cy=innerHeight*(.18+Math.random()*.45);for(let i=0;i<42;i++){const s=document.createElement('div');s.className='spark';s.style.left=cx+'px';s.style.top=cy+'px';const a=Math.random()*Math.PI*2,r=45+Math.random()*130;s.style.setProperty('--x',Math.cos(a)*r+'px');s.style.setProperty('--y',Math.sin(a)*r+'px');s.style.background=['#fff','#ffd1dc','#ff477e','#ffe66d'][Math.floor(Math.random()*4)];document.body.appendChild(s);setTimeout(()=>s.remove(),900);}}}
</script>
</body></html>
