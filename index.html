<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gửi vợ yêu ❤️</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#3b0b1d,#050505 60%);color:white;font-family:Arial,Helvetica,sans-serif;overflow:hidden}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}.card{max-width:760px;width:100%;padding:34px 22px;border:1px solid rgba(255,255,255,.18);border-radius:28px;background:rgba(255,255,255,.08);box-shadow:0 0 60px rgba(255,40,100,.25);backdrop-filter:blur(10px)}.small{opacity:.85;font-size:18px}.count{font-size:88px;font-weight:800;margin:22px 0;text-shadow:0 0 25px #ff4d7d}.title{font-size:34px;font-weight:800;line-height:1.25;margin:14px 0;color:#ffd6df}.msg{font-size:22px;line-height:1.55;white-space:pre-line;min-height:190px}.btn{margin-top:20px;border:0;border-radius:999px;padding:14px 24px;font-size:18px;font-weight:700;background:#fff;color:#99113c}.heart{position:fixed;bottom:-30px;font-size:22px;animation:fly 6s linear forwards;opacity:.85}@keyframes fly{to{transform:translateY(-110vh) rotate(360deg);opacity:0}}canvas{position:fixed;inset:0;pointer-events:none}.hide{display:none}</style></head><body><canvas id="fw"></canvas><div class="wrap"><div class="card"><div id="intro"><div class="small">Có một bất ngờ nhỏ dành cho em...</div><div class="count" id="count">3</div><button class="btn" onclick="start()">Bấm để mở lời chúc ❤️</button></div><div id="main" class="hide"><div class="title">🎂 Chúc mừng sinh nhật vợ yêu ❤️</div><div class="msg" id="msg"></div><button class="btn" onclick="playMusic()">Bật nhạc nhẹ 🎵</button></div></div></div><audio id="music" loop src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_5fe8b9c687.mp3?filename=soft-piano-121529.mp3"></audio><script>let opened=false;function start(){if(opened)return;opened=true;let c=3,el=document.getElementById('count');let t=setInterval(()=>{c--;el.textContent=c>0?c:'❤️';if(c<=0){clearInterval(t);setTimeout(show,700)}},900);playMusic()}function show(){document.getElementById('intro').classList.add('hide');document.getElementById('main').classList.remove('hide');typeText();boom()}const text=`Vợ yêu à,\n\nChúc em sinh nhật thật vui vẻ, luôn xinh đẹp, bình an và hạnh phúc.\n\nCảm ơn em đã ở bên anh, cùng anh xây dựng gia đình nhỏ của mình.\n\nCảm ơn em đã sinh cho anh bé Khải Minh đáng yêu.\n\nAnh thương em nhiều lắm.\n\nMãi yêu vợ ❤️`;function typeText(){let i=0,m=document.getElementById('msg');let it=setInterval(()=>{m.textContent=text.slice(0,i++);if(i>text.length)clearInterval(it)},45)}function playMusic(){document.getElementById('music').play().catch(()=>{})}setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent=['❤️','💗','💕','💖'][Math.floor(Math.random()*4)];h.style.left=Math.random()*100+'vw';h.style.fontSize=18+Math.random()*22+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),6200)},350);const cv=document.getElementById('fw'),ctx=cv.getContext('2d');function resize(){cv.width=innerWidth;cv.height=innerHeight}resize();addEventListener('resize',resize);let ps=[];function boom(){for(let j=0;j<7;j++)setTimeout(()=>fire(Math.random()*cv.width,Math.random()*cv.height*.55),j*450)}function fire(x,y){for(let i=0;i<80;i++)ps.push({x,y,a:Math.random()*Math.PI*2,s:Math.random()*5+1,l:70})}function anim(){ctx.clearRect(0,0,cv.width,cv.height);ps=ps.filter(p=>p.l-->0);for(const p of ps){p.x+=Math.cos(p.a)*p.s;p.y+=Math.sin(p.a)*p.s+p.l*.002;ctx.globalAlpha=p.l/70;ctx.fillStyle='white';ctx.fillRect(p.x,p.y,2,2)}requestAnimationFrame(anim)}anim();</script></body></html>
